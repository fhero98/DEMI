automation:
  - alias: EV Update Weekly Analytics Per Vehicle
    trigger:
      - platform: mqtt
        topic: ev/building103/charging_sessions
    condition:
      - condition: template
        value_template: "{{ trigger.payload_json.id_tag_slug is defined }}"
    variables:
      vehicle_slug: "{{ trigger.payload_json.id_tag_slug }}"
      session_status: "{{ trigger.payload_json.session_status | default('unknown') }}"
      completed_counter: "counter.ev_weekly_completed_{{ vehicle_slug }}"
      failed_counter: "counter.ev_weekly_failed_{{ vehicle_slug }}"
      energy_entity: "input_number.ev_weekly_energy_{{ vehicle_slug }}"
      duration_entity: "input_number.ev_weekly_duration_{{ vehicle_slug }}"
      max_power_entity: "input_number.ev_weekly_max_power_{{ vehicle_slug }}"
      energy_value: "{{ trigger.payload_json.energy_kwh | default(0) | float(0) }}"
      duration_value: "{{ trigger.payload_json.duration | default(0) | float(0) }}"
      power_value: "{{ trigger.payload_json.max_power_kw | default(0) | float(0) }}"
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ session_status == 'ended' and states(completed_counter) not in ['unknown', 'unavailable'] }}"
            sequence:
              - service: counter.increment
                data:
                  entity_id: "{{ completed_counter }}"

              - service: input_number.set_value
                data:
                  entity_id: "{{ energy_entity }}"
                  value: "{{ states(energy_entity) | float(0) + energy_value }}"

              - service: input_number.set_value
                data:
                  entity_id: "{{ duration_entity }}"
                  value: "{{ states(duration_entity) | float(0) + duration_value }}"

              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ power_value > (states(max_power_entity) | float(0)) }}"
                    sequence:
                      - service: input_number.set_value
                        data:
                          entity_id: "{{ max_power_entity }}"
                          value: "{{ power_value }}"

          - conditions:
              - condition: template
                value_template: "{{ session_status == 'failed' and states(failed_counter) not in ['unknown', 'unavailable'] }}"
            sequence:
              - service: counter.increment
                data:
                  entity_id: "{{ failed_counter }}"
    mode: queued

  - alias: EV Weekly Charging Summary For All Vehicles
    trigger:
      - platform: time
        at: "20:00:00"
    condition:
      - condition: time
        weekday:
          - sun
    action:
      - repeat:
          for_each: "{{ expand('group.ev_weekly_vehicle_completed_counters') | map(attribute='entity_id') | list }}"
          sequence:
            - variables:
                slug: "{{ repeat.item | replace('counter.ev_weekly_completed_', '') }}"
                vehicle_name: "{{ state_attr(repeat.item, 'friendly_name') | replace('EV Weekly Completed ', '') }}"
                completed: "{{ states('counter.ev_weekly_completed_' ~ slug) }}"
                failed: "{{ states('counter.ev_weekly_failed_' ~ slug) }}"
                energy: "{{ states('input_number.ev_weekly_energy_' ~ slug) }}"
                duration: "{{ states('input_number.ev_weekly_duration_' ~ slug) }}"
                max_power: "{{ states('input_number.ev_weekly_max_power_' ~ slug) }}"

            - service: notify.mobile_app_fotis_device
              data:
                title: "EV Weekly Summary {{ vehicle_name }}"
                message: >
                  Completed sessions: {{ completed }}
                  Failed sessions: {{ failed }}
                  Total energy: {{ energy }} kWh
                  Total duration: {{ duration }} min
                  Max power: {{ max_power }} kW
                data:
                  tag: "weekly_summary_{{ slug }}"
                  group: "weekly_summary_{{ slug }}"
                  channel: "EV Weekly Summary"

            - delay:
                seconds: 2

      - repeat:
          for_each: "{{ expand('group.ev_weekly_vehicle_completed_counters') | map(attribute='entity_id') | list }}"
          sequence:
            - variables:
                slug: "{{ repeat.item | replace('counter.ev_weekly_completed_', '') }}"

            - service: counter.reset
              data:
                entity_id: "{{ 'counter.ev_weekly_completed_' ~ slug }}"

            - service: counter.reset
              data:
                entity_id: "{{ 'counter.ev_weekly_failed_' ~ slug }}"

            - service: input_number.set_value
              data:
                entity_id: "{{ 'input_number.ev_weekly_energy_' ~ slug }}"
                value: 0

            - service: input_number.set_value
              data:
                entity_id: "{{ 'input_number.ev_weekly_duration_' ~ slug }}"
                value: 0

            - service: input_number.set_value
              data:
                entity_id: "{{ 'input_number.ev_weekly_max_power_' ~ slug }}"
                value: 0
    mode: single
