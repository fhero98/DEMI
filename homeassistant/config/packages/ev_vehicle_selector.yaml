template:
  - sensor:
      - name: "EV Selected Vehicle ID"
        unique_id: ev_selected_vehicle_id
        state: "{{ states('input_select.ev_selected_vehicle') }}"

      - name: "EV Selected Daily Completed"
        unique_id: ev_selected_daily_completed
        state: >
          {{ states('counter.ev_daily_completed_' ~ states('input_select.ev_selected_vehicle')) | int(0) }}

      - name: "EV Selected Daily Failed"
        unique_id: ev_selected_daily_failed
        state: >
          {{ states('counter.ev_daily_failed_' ~ states('input_select.ev_selected_vehicle')) | int(0) }}

      - name: "EV Selected Daily Energy"
        unique_id: ev_selected_daily_energy
        unit_of_measurement: "kWh"
        state: >
          {{ states('input_number.ev_daily_energy_' ~ states('input_select.ev_selected_vehicle')) | float(0) }}

      - name: "EV Selected Daily Duration"
        unique_id: ev_selected_daily_duration
        unit_of_measurement: "min"
        state: >
          {{ states('input_number.ev_daily_duration_' ~ states('input_select.ev_selected_vehicle')) | float(0) }}

      - name: "EV Selected Daily Max Power"
        unique_id: ev_selected_daily_max_power
        unit_of_measurement: "kW"
        state: >
          {{ states('input_number.ev_daily_max_power_' ~ states('input_select.ev_selected_vehicle')) | float(0) }}

      - name: "EV Selected Weekly Completed"
        unique_id: ev_selected_weekly_completed
        state: >
          {{ states('counter.ev_weekly_completed_' ~ states('input_select.ev_selected_vehicle')) | int(0) }}

      - name: "EV Selected Weekly Failed"
        unique_id: ev_selected_weekly_failed
        state: >
          {{ states('counter.ev_weekly_failed_' ~ states('input_select.ev_selected_vehicle')) | int(0) }}

      - name: "EV Selected Weekly Energy"
        unique_id: ev_selected_weekly_energy
        unit_of_measurement: "kWh"
        state: >
          {{ states('input_number.ev_weekly_energy_' ~ states('input_select.ev_selected_vehicle')) | float(0) }}

      - name: "EV Selected Weekly Duration"
        unique_id: ev_selected_weekly_duration
        unit_of_measurement: "min"
        state: >
          {{ states('input_number.ev_weekly_duration_' ~ states('input_select.ev_selected_vehicle')) | float(0) }}

      - name: "EV Selected Weekly Max Power"
        unique_id: ev_selected_weekly_max_power
        unit_of_measurement: "kW"
        state: >
          {{ states('input_number.ev_weekly_max_power_' ~ states('input_select.ev_selected_vehicle')) | float(0) }}
